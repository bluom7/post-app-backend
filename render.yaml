services:
  - type: web
    name: post-app-backend
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn server:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: MONGO_URL
        sync: false
      - key: DB_NAME
        value: postapp
      - key: JWT_SECRET
        sync: false
      - key: RESEND_API_KEY
        sync: false
