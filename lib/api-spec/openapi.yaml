openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: posts
    description: Posts feed operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /posts:
    get:
      operationId: listPosts
      tags: [posts]
      summary: List all posts
      parameters:
        - name: category
          in: query
          schema:
            type: string
            enum: [yellow, green, red, blue]
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: List of posts
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListPostsResponse"
    post:
      operationId: createPost
      tags: [posts]
      summary: Create a new post
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePostBody"
      responses:
        "201":
          description: Post created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PostResponse"
        "400":
          description: Bad request

  /posts/{id}:
    get:
      operationId: getPost
      tags: [posts]
      summary: Get a single post
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Post found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PostResponse"
        "404":
          description: Post not found
    delete:
      operationId: deletePost
      tags: [posts]
      summary: Delete a post
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Post deleted
        "404":
          description: Post not found

  /posts/{id}/like:
    post:
      operationId: toggleLike
      tags: [posts]
      summary: Like or unlike a post
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LikeBody"
      responses:
        "200":
          description: Like toggled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LikeResponse"

  /posts/{id}/save:
    post:
      operationId: toggleSave
      tags: [posts]
      summary: Save or unsave a post
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SaveBody"
      responses:
        "200":
          description: Save toggled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SaveResponse"

  /posts/{id}/comments:
    get:
      operationId: listComments
      tags: [posts]
      summary: Get comments for a post
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of comments
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListCommentsResponse"
    post:
      operationId: addComment
      tags: [posts]
      summary: Add a comment to a post
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddCommentBody"
      responses:
        "201":
          description: Comment added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommentResponse"
        "400":
          description: Bad request

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    PostCategory:
      type: string
      enum: [yellow, green, red, blue]

    PostResponse:
      type: object
      properties:
        id:
          type: integer
        userId:
          type: string
        username:
          type: string
        content:
          type: string
          nullable: true
        imageUrl:
          type: string
          nullable: true
        category:
          $ref: "#/components/schemas/PostCategory"
        likesCount:
          type: integer
        commentsCount:
          type: integer
        savesCount:
          type: integer
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - userId
        - username
        - category
        - likesCount
        - commentsCount
        - savesCount
        - createdAt
        - updatedAt

    ListPostsResponse:
      type: object
      properties:
        posts:
          type: array
          items:
            $ref: "#/components/schemas/PostResponse"
        total:
          type: integer
      required:
        - posts
        - total

    CreatePostBody:
      type: object
      properties:
        username:
          type: string
        content:
          type: string
          nullable: true
        imageUrl:
          type: string
          nullable: true
        category:
          $ref: "#/components/schemas/PostCategory"
      required:
        - username
        - category

    LikeBody:
      type: object
      properties:
        userId:
          type: string
      required:
        - userId

    LikeResponse:
      type: object
      properties:
        liked:
          type: boolean
        likesCount:
          type: integer
      required:
        - liked
        - likesCount

    SaveBody:
      type: object
      properties:
        userId:
          type: string
      required:
        - userId

    SaveResponse:
      type: object
      properties:
        saved:
          type: boolean
        savesCount:
          type: integer
      required:
        - saved
        - savesCount

    AddCommentBody:
      type: object
      properties:
        userId:
          type: string
        username:
          type: string
        content:
          type: string
      required:
        - userId
        - username
        - content

    CommentResponse:
      type: object
      properties:
        id:
          type: integer
        postId:
          type: integer
        userId:
          type: string
        username:
          type: string
        content:
          type: string
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - postId
        - userId
        - username
        - content
        - createdAt

    ListCommentsResponse:
      type: object
      properties:
        comments:
          type: array
          items:
            $ref: "#/components/schemas/CommentResponse"
      required:
        - comments
